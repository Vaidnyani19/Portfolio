<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Network</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050d12;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
        }

        /* Demo content to show it sits behind */
        .content {
            position: relative;
            z-index: 1;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            padding: 50px;
            pointer-events: none; /* Let clicks pass through to canvas if needed, or disable if content should be interactive */
        }
        
        .content h1 {
            color: #00e5c8;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="content">
        <h1>Particle System Initialized</h1>
        <p>> Connection established...<br>> Status: Active<br>> Mouse over to interact | Click to burst</p>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let burstParticles = [];
        const particleCount = 80;
        const maxDistance = 100;
        const mouseRadius = 120;
        const repelStrength = 0.5;
        
        const mouse = {
            x: null,
            y: null
        };

        const theme = {
            bg: '#050d12',
            accent: '#00e5c8',
            accentRGB: '0, 229, 200'
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });

        class Particle {
            constructor(x, y, vx, vy, size, isBurst = false) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.vx = vx || (Math.random() - 0.5) * 0.8;
                this.vy = vy || (Math.random() - 0.5) * 0.8;
                this.size = size || Math.random() * 1.5 + 1.5; // 2-3px
                this.isBurst = isBurst;
                this.life = isBurst ? 1.0 : null;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${theme.accentRGB}, ${this.isBurst ? this.life : 1})`;
                
                // Bloom effect
                ctx.shadowBlur = 8;
                ctx.shadowColor = theme.accent;
                
                ctx.fill();
                ctx.shadowBlur = 0; // Reset for other drawings
            }

            update() {
                // Wrap around
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Mouse repel
                if (mouse.x != null && mouse.y != null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouseRadius) {
                        let force = (mouseRadius - distance) / mouseRadius;
                        let dirX = dx / distance;
                        let dirY = dy / distance;
                        this.vx += dirX * force * repelStrength;
                        this.vy += dirY * force * repelStrength;
                    }
                }

                // Friction for repel
                this.vx *= 0.98;
                this.vy *= 0.98;

                // Minimum speed to keep them drifting
                const minSpeed = 0.3;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < minSpeed) {
                    this.vx += (Math.random() - 0.5) * 0.1;
                    this.vy += (Math.random() - 0.5) * 0.1;
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.isBurst) {
                    this.life -= 0.01;
                }
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function createBurst(x, y) {
            for (let i = 0; i < 10; i++) {
                const vx = (Math.random() - 0.5) * 5;
                const vy = (Math.random() - 0.5) * 5;
                burstParticles.push(new Particle(x, y, vx, vy, Math.random() * 2 + 1, true));
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        // Opacity fades with distance: Close = 0.6, Far (100px) = 0.15
                        const opacity = 0.6 - (distance / maxDistance) * (0.6 - 0.15);
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(${theme.accentRGB}, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            if (document.visibilityState === 'hidden') {
                requestAnimationFrame(animate);
                return;
            }

            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawLines();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Handle burst particles separately
            for (let i = burstParticles.length - 1; i >= 0; i--) {
                const bp = burstParticles[i];
                bp.update();
                bp.draw();
                if (bp.life <= 0) {
                    burstParticles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
