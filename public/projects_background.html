<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warping Perspective Grid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #050d12;
        }

        #grid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Demo Scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            color: #00e5c8;
            font-family: 'Courier New', Courier, monospace;
            padding: 100px;
            pointer-events: none;
        }
        
        .content h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(0, 229, 200, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="grid-canvas"></canvas>
    <div class="scanlines"></div>

    <div class="content">
        <h1>PROJECTS</h1>
        <p>> Navigating neural grid...<br>> Status: Synced</p>
    </div>

    <script>
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let scrollY = 0;
        const mouse = { x: -1000, y: -1000 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('scroll', () => {
            scrollY = window.pageYOffset;
        });

        resize();

        function draw() {
            time += 0.01;
            ctx.fillStyle = '#050d12';
            ctx.fillRect(0, 0, width, height);

            const horizon = height * 0.45;
            const gridSpacing = 60;
            const numVertLines = 40;
            const numHorizLines = 20;

            // Perspective Logic
            ctx.lineWidth = 1;
            
            // Draw Vertical Perspective Lines
            for (let i = -numVertLines / 2; i <= numVertLines / 2; i++) {
                ctx.beginPath();
                const opacity = i === 0 ? 0.45 : 0.18;
                ctx.strokeStyle = `rgba(0, 229, 200, ${opacity})`;

                const startX = width / 2 + i * gridSpacing * 5;
                const endX = width / 2 + i * 10; // Converge to center

                // We'll sample points along the line to apply the warp
                ctx.moveTo(width / 2 + (startX - width / 2), height);
                
                for (let y = height; y >= horizon; y -= 20) {
                    const ratio = (y - horizon) / (height - horizon);
                    const x = width / 2 + (startX - width / 2) * ratio;
                    
                    // Warp Logic
                    const warp = getWarp(x, y);
                    ctx.lineTo(x + warp.x, y + warp.y);
                }
                ctx.stroke();
            }

            // Draw Horizontal Lines with exponential spacing
            for (let i = 0; i < numHorizLines; i++) {
                const ratio = Math.pow(i / numHorizLines, 2);
                const y = horizon + ratio * (height - horizon) + (scrollY * 0.05 % 50);
                if (y > height || y < horizon) continue;

                ctx.beginPath();
                const opacity = 0.18 * (1 - (numHorizLines - i) / numHorizLines);
                ctx.strokeStyle = `rgba(0, 229, 200, ${opacity})`;

                for (let x = -100; x <= width + 100; x += 30) {
                    const warp = getWarp(x, y);
                    if (x === -100) ctx.moveTo(x + warp.x, y + warp.y);
                    else ctx.lineTo(x + warp.x, y + warp.y);
                }
                ctx.stroke();
            }

            // Horizon Glow
            const grad = ctx.createRadialGradient(width/2, horizon, 0, width/2, horizon, width/2);
            grad.addColorStop(0, 'rgba(0, 229, 200, 0.15)');
            grad.addColorStop(1, 'rgba(0, 229, 200, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, horizon - 50, width, 100);

            requestAnimationFrame(draw);
        }

        function getWarp(x, y) {
            // Sine wave distortion
            const waveX = Math.sin(time + y * 0.01 + scrollY * 0.005) * 10;
            const waveY = Math.cos(time + x * 0.01) * 8;

            // Mouse ripple
            const dx = x - mouse.x;
            const dy = y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            let mouseWarpX = 0;
            let mouseWarpY = 0;

            if (dist < 150) {
                const force = (150 - dist) / 150;
                mouseWarpX = (dx / dist) * force * 20 * Math.sin(time * 5);
                mouseWarpY = (dy / dist) * force * 20 * Math.cos(time * 5);
            }

            return { 
                x: waveX + mouseWarpX, 
                y: waveY + mouseWarpY 
            };
        }

        draw();
    </script>
</body>
</html>
